aid: graphql-mesh
name: GraphQL Mesh
description: >-
  GraphQL Mesh is a framework by The Guild that allows you to use GraphQL to
  query any data source, including REST APIs, gRPC, SOAP, OpenAPI, and
  databases, by automatically generating a unified GraphQL schema from existing
  API specifications.
